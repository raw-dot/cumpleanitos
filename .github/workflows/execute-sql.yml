name: Execute SQL Migration

on:
  workflow_dispatch:
    inputs:
      sql_file:
        description: 'SQL file to execute (path relative to repo root)'
        required: true
        default: 'migrations/2026-04-02_v0.11-step1-create-view-FIXED.sql'

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Execute SQL
        env:
          SUPABASE_URL: https://bbhmbnhbzhbyktztdrhu.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          SQL=$(cat "${{ github.event.inputs.sql_file }}")
          
          curl -X POST "${SUPABASE_URL}/rest/v1/rpc/exec_sql" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":$(echo "$SQL" | jq -Rs .)}"
