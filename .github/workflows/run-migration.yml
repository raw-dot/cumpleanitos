name: Run Supabase Migration

on:
  workflow_dispatch:
    inputs:
      migration_file:
        description: 'Migration file to run (e.g., 2026-04-02_fix-google-oauth-trigger.sql)'
        required: true
        type: string

jobs:
  run-migration:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Run migration
        env:
          SUPABASE_URL: https://bbhmbnhbzhbyktztdrhu.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MIGRATION_FILE: ${{ github.event.inputs.migration_file }}
        run: |
          cat > run-migration.js << 'EOF'
          const { createClient } = require('@supabase/supabase-js');
          const fs = require('fs');
          const path = require('path');

          const supabaseUrl = process.env.SUPABASE_URL;
          const serviceRoleKey = process.env.SUPABASE_SERVICE_ROLE_KEY;
          const migrationFile = process.env.MIGRATION_FILE;

          if (!supabaseUrl || !serviceRoleKey || !migrationFile) {
            console.error('❌ Missing required environment variables');
            process.exit(1);
          }

          const supabase = createClient(supabaseUrl, serviceRoleKey, {
            auth: {
              autoRefreshToken: false,
              persistSession: false
            }
          });

          async function runMigration() {
            try {
              const migrationPath = path.join('migrations', migrationFile);
              
              if (!fs.existsSync(migrationPath)) {
                console.error(`❌ Migration file not found: ${migrationPath}`);
                process.exit(1);
              }

              const sql = fs.readFileSync(migrationPath, 'utf8');
              
              console.log('📋 Running migration:', migrationFile);
              console.log('━'.repeat(50));
              
              // Split by semicolon and execute each statement
              const statements = sql
                .split(';')
                .map(s => s.trim())
                .filter(s => s.length > 0 && !s.startsWith('--'));

              for (let i = 0; i < statements.length; i++) {
                const statement = statements[i] + ';';
                console.log(`\n📝 Executing statement ${i + 1}/${statements.length}...`);
                
                const { data, error } = await supabase.rpc('exec_sql', { sql: statement });
                
                if (error) {
                  console.error(`❌ Error in statement ${i + 1}:`, error);
                  process.exit(1);
                }
                
                console.log(`✅ Statement ${i + 1} executed successfully`);
                if (data) {
                  console.log('Result:', JSON.stringify(data, null, 2));
                }
              }

              console.log('\n' + '━'.repeat(50));
              console.log('🎉 Migration completed successfully!');
              
            } catch (error) {
              console.error('❌ Migration failed:', error);
              process.exit(1);
            }
          }

          runMigration();
          EOF

          node run-migration.js

      - name: Summary
        if: success()
        run: |
          echo "✅ Migration executed successfully: ${{ github.event.inputs.migration_file }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for details." >> $GITHUB_STEP_SUMMARY
